{% extends 'gestion/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2>Lista de Categorías</h2>
        <a href="{% url 'crear_categoria' %}" class="btn btn-primary">Nueva Categoría</a>
    </div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for categoria in categorias %}
                <tr>
                    <td>{{ categoria.id_Categorias }}</td>
                    <td>{{ categoria.nombre }}</td>
                    <td>
                        <a href="{% url 'editar_categoria' categoria.id_Categorias %}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="{% url 'eliminar_categoria' categoria.id_Categorias %}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay categorías registradas</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
