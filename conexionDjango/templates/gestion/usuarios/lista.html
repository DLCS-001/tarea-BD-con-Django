{% extends 'gestion/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2>Lista de Usuarios</h2>
        <a href="{% url 'crear_usuario' %}" class="btn btn-primary">Nuevo Usuario</a>
    </div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombres</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>{{ usuario.id_usuarios }}</td>
                    <td>{{ usuario.nombres }}</td>
                    <td>{{ usuario.correo }}</td>
                    <td>
                        <a href="{% url 'editar_usuario' usuario.id_usuarios %}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="{% url 'eliminar_usuario' usuario.id_usuarios %}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No hay usuarios registrados</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
