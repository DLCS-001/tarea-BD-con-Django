{% extends 'gestion/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2>Lista de Autores</h2>
        <a href="{% url 'crear_autor' %}" class="btn btn-primary">Nuevo Autor</a>
    </div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombres</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for autor in autores %}
                <tr>
                    <td>{{ autor.id_autores }}</td>
                    <td>{{ autor.nombres }}</td>
                    <td>
                        <a href="{% url 'editar_autor' autor.id_autores %}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="{% url 'eliminar_autor' autor.id_autores %}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay autores registrados</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
