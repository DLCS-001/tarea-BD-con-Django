{% extends 'gestion/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{{ accion }} Autor</h2>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">
                    {% if field.name == 'nombres' %}Nombres completos{% else %}{{ field.label }}{% endif %}
                </label>
                {{ field }}
                {% if field.errors %}
                <div class="alert alert-danger">
                    {{ field.errors }}
                </div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'lista_autores' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
