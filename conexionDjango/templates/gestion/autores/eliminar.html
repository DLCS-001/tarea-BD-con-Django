{% extends 'gestion/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Eliminar Autor</h2>
    </div>
    <div class="card-body">
        <p>¿Estás seguro de que deseas eliminar al autor <strong>"{{ autor.nombres }}"</strong>?</p>
        <p class="text-danger">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'lista_autores' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
